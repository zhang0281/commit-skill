interface:
  display_name: "Commit"
  short_description: "自动生成计划 JSON、语义裁决并安全执行 Git 提交"
  default_prompt: "先自动运行 scripts/commit_skill.py plan 获取结构化计划 JSON；AI 只负责按语义合并/拆分 commits、补全中文 type/title/bullets，并在执行前调用 coverage --plan-file 收口，最后统一用 apply-plan 执行；submodule internal 与 pointer 更新必须分阶段处理；sign-mode 默认 auto，GPG 可用时优先签名；所有错误按统一错误码输出。"
