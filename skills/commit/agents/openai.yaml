interface:
  display_name: "Commit"
  short_description: "固定候选提交后，仅用 AI 生成 commit message，其余全部脚本执行"
  default_prompt: "使用 fast-path：1) 运行 plan --summary-only 固定 candidate commits；2) 运行 message-template --plan-file，让 AI 只填写 commits[].id/type/title/bullets，禁止改 paths、repo_path、sign_mode、commit 数量与顺序；3) 运行 apply-plan --plan-file ... --messages-file ... --json，由脚本完成 merge、message coverage audit、coverage、submodule 顺序校验、signing 与 git commit。不要启用子代理，不要手写 git 命令。最终回复使用 summary/plan/result/remaining/next_step。"
